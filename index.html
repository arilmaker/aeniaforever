<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu Sayang</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* SCENE INTRO */
        #scene-intro {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
            z-index: 100;
        }

        .greetings h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            gap: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .greetings .description {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #dcdcdc;
            text-align: center;
        }

        .greetings .button button {
            background: transparent;
            border: 1px solid white;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .greetings .button button a {
            color: white;
            text-decoration: none;
        }

        .greetings .button button:hover {
            background: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .greetings .button button:hover a {
            color: #050505;
        }

        /* SCENE FLOWER */
        #scene-flower {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #020202;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="200" cy="80" r="1.5" fill="white" opacity="0.6"/><circle cx="100" cy="200" r="1" fill="white" opacity="0.9"/><circle cx="280" cy="40" r="1.2" fill="white" opacity="0.5"/><circle cx="150" cy="150" r="0.8" fill="white" opacity="0.7"/></svg>') repeat;
            animation: twinkle 4s infinite alternate;
        }

        /* BUNGA */
        .flower-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 520px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .flower {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
        }

        .flower--1 { left: 38%; transform: scale(0.78) rotate(-15deg); }
        .flower--2 { left: 50%; transform: scale(1) translateX(-50%); z-index: 10; }
        .flower--3 { left: 62%; transform: scale(0.82) rotate(15deg); }

        .stem {
            width: 6px;
            background: linear-gradient(to top, #0f3b25, #35b364);
            border-radius: 4px;
            position: relative;
            transform-origin: bottom;
            animation: growStem 2.5s ease-out forwards;
            box-shadow: 0 0 10px rgba(53, 179, 100, 0.3);
        }
        .flower--1 .stem { height: 290px; animation-delay: 0.2s; }
        .flower--2 .stem { height: 360px; }
        .flower--3 .stem { height: 310px; animation-delay: 0.4s; }

        /* DAUN DITURUNKAN */
        .leaf {
            position: absolute;
            width: 50px;
            height: 25px;
            background: #35b364;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            box-shadow: 0 0 15px rgba(53, 179, 100, 0.4);
            animation: growLeaf 1.5s ease-out forwards;
        }
        .leaf--left { 
            left: -45px; 
            transform: rotate(-30deg); 
            animation-delay: 1.6s;
            bottom: 100px;   /* DITURUNKAN */
        }
        .leaf--right { 
            right: -45px; 
            border-radius: 0 50% 0 50%; 
            transform: rotate(30deg); 
            animation-delay: 1.9s;
            bottom: 165px;   /* DITURUNKAN */
        }

        .bloom {
            position: absolute;
            top: -65px;
            width: 85px;
            height: 85px;
            opacity: 0;
            animation: bloomFade 2s ease-out forwards;
        }
        .flower--1 .bloom { animation-delay: 2.8s; }
        .flower--2 .bloom { animation-delay: 2.5s; }
        .flower--3 .bloom { animation-delay: 3s; }

        .petal {
            position: absolute;
            width: 32px;
            height: 52px;
            background: radial-gradient(circle, #bde0ff, #509ce4);
            border-radius: 50%;
            top: 15px;
            left: 26px;
            transform-origin: bottom center;
            box-shadow: 0 0 20px rgba(173, 216, 230, 0.7);
        }
        .petal--1 { transform: rotate(0deg) translateY(-15px); }
        .petal--2 { transform: rotate(72deg) translateY(-15px); }
        .petal--3 { transform: rotate(144deg) translateY(-15px); }
        .petal--4 { transform: rotate(216deg) translateY(-15px); }
        .petal--5 { transform: rotate(288deg) translateY(-15px); }

        .light {
            position: absolute;
            top: 32px;
            left: 32px;
            width: 22px;
            height: 22px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 30px 10px #70dbff, 0 0 60px 20px rgba(112,219,255,0.8);
            animation: glowFlower 2s infinite alternate;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to top, #041c0e, transparent);
            z-index: 20;
        }

        /* ANIMASI */
        @keyframes growStem {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }
        @keyframes growLeaf {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes bloomFade {
            0% { transform: scale(0) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes glowFlower {
            0% { box-shadow: 0 0 20px 5px #70dbff; }
            100% { box-shadow: 0 0 40px 15px #70dbff; }
        }

        /* Teks & Foto */
        .float-text, .float-img {
            position: absolute;
            opacity: 0;
            animation: fallIn 4s forwards;
            pointer-events: none;
        }

        .float-text {
            font-size: 1.45rem;
            color: #ffe4e1;
            text-shadow: 0 0 15px rgba(255, 200, 200, 0.8);
        }

        .float-text.highlight {
            color: #ff9aee;
            font-size: 1.65rem;
            font-weight: 600;
        }

        .float-img {
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255,255,255,0.4);
            object-fit: cover;
        }

        @keyframes fallIn {
            0% { opacity: 0; transform: translateY(-200px) scale(0.5); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="scene-intro" class="greetings">
        <h1><span>A</span><span>E</span><span>N</span><span>I</span><span>♥</span></h1>
        <div class="description">wkwkwkwkwk Nih Untukmu Sayangggg ♥</div>
        <div class="button">
            <button><a href="#" onclick="showFlower(event)">Klik dong 🤍</a></button>
        </div>
    </div>

    <div id="scene-flower">
        <div class="stars"></div>

        <div class="flower-container">
            <!-- Flower 1 -->
            <div class="flower flower--1">
                <div class="stem">
                    <div class="leaf leaf--left"></div>
                    <div class="leaf leaf--right"></div>
                </div>
                <div class="bloom">
                    <div class="petal petal--1"></div>
                    <div class="petal petal--2"></div>
                    <div class="petal petal--3"></div>
                    <div class="petal petal--4"></div>
                    <div class="petal petal--5"></div>
                    <div class="light"></div>
                </div>
            </div>

            <!-- Flower 2 -->
            <div class="flower flower--2">
                <div class="stem">
                    <div class="leaf leaf--left"></div>
                    <div class="leaf leaf--right"></div>
                </div>
                <div class="bloom">
                    <div class="petal petal--1"></div>
                    <div class="petal petal--2"></div>
                    <div class="petal petal--3"></div>
                    <div class="petal petal--4"></div>
                    <div class="petal petal--5"></div>
                    <div class="light"></div>
                </div>
            </div>

            <!-- Flower 3 -->
            <div class="flower flower--3">
                <div class="stem">
                    <div class="leaf leaf--left"></div>
                    <div class="leaf leaf--right"></div>
                </div>
                <div class="bloom">
                    <div class="petal petal--1"></div>
                    <div class="petal petal--2"></div>
                    <div class="petal petal--3"></div>
                    <div class="petal petal--4"></div>
                    <div class="petal petal--5"></div>
                    <div class="light"></div>
                </div>
            </div>

            <div class="grass"></div>
        </div>

        <!-- Teks & Foto -->
        <div class="float-text highlight" style="top: 12%; left: 8%; animation-delay: 3.8s;">you mean everything</div>
        <div class="float-text" style="top: 22%; left: 35%; animation-delay: 4.3s;">only you</div>
        <div class="float-text" style="top: 18%; right: 12%; animation-delay: 4.8s;">forever</div>
        <div class="float-text highlight" style="top: 38%; right: 15%; animation-delay: 5.3s;">stay with me</div>
        <div class="float-text" style="top: 48%; left: 10%; animation-delay: 5.8s;">my safe place</div>
        <div class="float-text highlight" style="top: 75%; right: 18%; animation-delay: 6.5s;">my favorite person</div>

        <img src="https://l.top4top.io/p_3829oy42d1.jpg" class="float-img" style="top: 25%; left: 22%; width: 130px; height: 130px; animation-delay: 4.5s;">
        <img src="https://k.top4top.io/p_3829982yz1.jpg" class="float-img" style="top: 48%; right: 18%; width: 110px; height: 140px; animation-delay: 6s;">
        <img src="https://j.top4top.io/p_3829imrjp1.jpg" class="float-img" style="top: 65%; left: 12%; width: 120px; height: 120px; animation-delay: 7s;">
    </div>

    <audio id="bg-music" loop>
        <source src="https://c.top4top.io/m_3829ij73b1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let audio = document.getElementById('bg-music');

        function showFlower(event) {
            event.preventDefault(); 
            
            const intro = document.getElementById('scene-intro');
            const flowerScene = document.getElementById('scene-flower');
            
            intro.style.opacity = '0';
            
            setTimeout(() => {
                intro.style.display = 'none';
                flowerScene.style.display = 'block';
                
                // Musik langsung nyala tanpa delay
                audio.play().catch(err => console.log(err));
                
                setTimeout(() => {
                    flowerScene.style.opacity = '1';
                }, 50);
            }, 800); // Sedikit percepatan transisi
        }
    </script>
</body>
</html>
